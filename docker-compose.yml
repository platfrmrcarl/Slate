services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: slate
      POSTGRES_PASSWORD: slate
      POSTGRES_DB: slate
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U slate -d slate"]
      interval: 5s
      timeout: 3s
      retries: 10

  fake-gcs:
    image: fsouza/fake-gcs-server:1.50
    restart: unless-stopped
    command:
      [
        "-scheme",
        "http",
        "-port",
        "4443",
        "-public-host",
        "localhost:4443",
        "-external-url",
        "http://localhost:4443",
      ]
    ports:
      - "4443:4443"
    volumes:
      - fake-gcs-data:/storage

volumes:
  postgres-data:
  fake-gcs-data:
