services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: wpk
      POSTGRES_PASSWORD: wpk
      POSTGRES_DB: wpk
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wpk -d wpk"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
