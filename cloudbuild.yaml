steps:
  - id: install
    name: node:22
    entrypoint: bash
    args:
      - -lc
      - |
        corepack enable
        pnpm install --frozen-lockfile

  - id: lint
    name: node:22
    entrypoint: bash
    args:
      - -lc
      - |
        corepack enable
        pnpm lint
        pnpm format:check
        pnpm typecheck
    waitFor: ["install"]

  - id: test
    name: node:22
    entrypoint: bash
    args:
      - -lc
      - |
        corepack enable
        pnpm test
    waitFor: ["install"]
    env:
      - "NODE_ENV=test"

  - id: build-image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - "--tag=${_AR_HOST}/${PROJECT_ID}/${_AR_REPO}/wpk:${SHORT_SHA}"
      - "--tag=${_AR_HOST}/${PROJECT_ID}/${_AR_REPO}/wpk:latest"
      - "."
    waitFor: ["lint", "test"]

  - id: push-image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - "--all-tags"
      - "${_AR_HOST}/${PROJECT_ID}/${_AR_REPO}/wpk"
    waitFor: ["build-image"]

substitutions:
  _AR_HOST: us-central1-docker.pkg.dev
  _AR_REPO: wpk

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s
