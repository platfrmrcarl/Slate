steps:
  - id: install
    name: node:22
    entrypoint: bash
    args:
      - -lc
      - |
        corepack enable
        pnpm install --frozen-lockfile

  - id: lint
    name: node:22
    entrypoint: bash
    args:
      - -lc
      - |
        corepack enable
        pnpm lint
        pnpm format:check
        pnpm typecheck
    waitFor: ["install"]

  - id: test
    name: node:22
    entrypoint: bash
    args:
      - -lc
      - |
        corepack enable
        pnpm test
    waitFor: ["install"]
    env:
      - "NODE_ENV=test"

  # Docker build produces the runner image. The Dockerfile's `build` stage
  # runs `pnpm build` internally, so we don't run it separately in Cloud Build
  # (it would just be thrown away). Layer cache is pulled from / pushed to
  # `slate-buildcache:latest` in Artifact Registry, so the `deps` stage
  # (pnpm install) is reused across builds when pnpm-lock.yaml is unchanged.
  - id: build-image
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -lc
      - |
        docker buildx create --use --name slate-builder --driver docker-container >/dev/null
        docker buildx build \
          --target=runner \
          --cache-from=type=registry,ref=${_AR_HOST}/${PROJECT_ID}/${_AR_REPO}/slate-buildcache:latest \
          --cache-to=type=registry,ref=${_AR_HOST}/${PROJECT_ID}/${_AR_REPO}/slate-buildcache:latest,mode=max \
          --tag=${_AR_HOST}/${PROJECT_ID}/${_AR_REPO}/slate:${SHORT_SHA} \
          --tag=${_AR_HOST}/${PROJECT_ID}/${_AR_REPO}/slate:latest \
          --push \
          .
    waitFor: ["lint", "test"]

  # Migration image reuses the same buildcache because the Dockerfile's
  # `migration` stage shares the `build` stage via COPY --from=build.
  - id: build-migration-image
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -lc
      - |
        docker buildx create --use --name slate-builder --driver docker-container >/dev/null 2>&1 || docker buildx use slate-builder
        docker buildx build \
          --target=migration \
          --cache-from=type=registry,ref=${_AR_HOST}/${PROJECT_ID}/${_AR_REPO}/slate-buildcache:latest \
          --tag=${_AR_HOST}/${PROJECT_ID}/${_AR_REPO}/slate-migration:${SHORT_SHA} \
          --push \
          .
    waitFor: ["lint", "test"]

  - id: run-migration
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -lc
      - |
        gcloud run jobs deploy slate-migrate \
          --image=${_AR_HOST}/${PROJECT_ID}/${_AR_REPO}/slate-migration:${SHORT_SHA} \
          --region=${_REGION} \
          --set-secrets=DATABASE_URL=DATABASE_URL:latest \
          --service-account=slate-runtime@${PROJECT_ID}.iam.gserviceaccount.com \
          --max-retries=0 \
          --quiet
        gcloud run jobs execute slate-migrate --region=${_REGION} --wait --quiet
    waitFor: ["build-migration-image", "build-image"]

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -lc
      - |
        # Ingress is owned by Terraform (internal-and-cloud-load-balancing).
        # Do NOT pass --allow-unauthenticated or --ingress here, or each
        # deploy would silently undo the TF-managed network policy.
        gcloud run deploy slate \
          --image=${_AR_HOST}/${PROJECT_ID}/${_AR_REPO}/slate:${SHORT_SHA} \
          --region=${_REGION} \
          --service-account=slate-runtime@${PROJECT_ID}.iam.gserviceaccount.com \
          --min-instances=0 \
          --max-instances=10 \
          --cpu=1 \
          --memory=1Gi \
          --port=8080 \
          --set-env-vars=NODE_ENV=production,LOG_LEVEL=info,OTEL_ENABLED=true,GCP_PROJECT_ID=${PROJECT_ID},GCP_REGION=${_REGION},APP_URL=https://slate.platfrmr.com,GCS_BUCKET_MEDIA=${PROJECT_ID}-wpk-media,GCS_BUCKET_THEMES=${PROJECT_ID}-wpk-themes,SLATE_MARKETING_HOME=1 \
          --set-secrets=DATABASE_URL=DATABASE_URL:latest,AUTH_SECRET=AUTH_SECRET:latest,PREVIEW_TOKEN_SECRET=PREVIEW_TOKEN_SECRET:latest,INTERNAL_JOB_SECRET=INTERNAL_JOB_SECRET:latest,STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest,STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest,STRIPE_PRICE_ESSENTIAL=STRIPE_PRICE_ESSENTIAL:latest,STRIPE_PRICE_PREMIUM=STRIPE_PRICE_PREMIUM:latest,STRIPE_PRICE_ENTERPRISE=STRIPE_PRICE_ENTERPRISE:latest \
          --quiet
    waitFor: ["run-migration"]

substitutions:
  _AR_HOST: us-east1-docker.pkg.dev
  _AR_REPO: slate
  _REGION: us-east1

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s
