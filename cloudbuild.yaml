steps:
  - id: install
    name: node:22
    entrypoint: bash
    args:
      - -lc
      - |
        corepack enable
        pnpm install --frozen-lockfile

  - id: lint
    name: node:22
    entrypoint: bash
    args:
      - -lc
      - |
        corepack enable
        pnpm lint
        pnpm format:check
        pnpm typecheck
    waitFor: ["install"]

  - id: test
    name: node:22
    entrypoint: bash
    args:
      - -lc
      - |
        corepack enable
        pnpm test
    waitFor: ["install"]
    env:
      - "NODE_ENV=test"

  - id: next-build
    name: node:22
    entrypoint: bash
    args:
      - -lc
      - |
        corepack enable
        pnpm build
    waitFor: ["install"]
    env:
      - "NODE_ENV=production"
      - "APP_URL=https://example.invalid"
      - "AUTH_SECRET=ci-build-only-not-used-at-runtime-padding-padding"
      - "PREVIEW_TOKEN_SECRET=ci-build-only-not-used-at-runtime-padding-padding"
      - "INTERNAL_JOB_SECRET=ci-build-only-not-used-at-runtime-padding-padding"
      - "DATABASE_URL=postgres://ci:ci@localhost:5432/ci"
      - "GCS_BUCKET_MEDIA=ci-bucket"

  - id: build-image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - "--target=runner"
      - "--tag=${_AR_HOST}/${PROJECT_ID}/${_AR_REPO}/slate:${SHORT_SHA}"
      - "--tag=${_AR_HOST}/${PROJECT_ID}/${_AR_REPO}/slate:latest"
      - "."
    waitFor: ["lint", "test", "next-build"]

  - id: push-image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - "--all-tags"
      - "${_AR_HOST}/${PROJECT_ID}/${_AR_REPO}/slate"
    waitFor: ["build-image"]

  - id: build-migration-image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - "--target=migration"
      - "--tag=${_AR_HOST}/${PROJECT_ID}/${_AR_REPO}/slate-migration:${SHORT_SHA}"
      - "."
    waitFor: ["lint", "test"]

  - id: push-migration-image
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - "${_AR_HOST}/${PROJECT_ID}/${_AR_REPO}/slate-migration:${SHORT_SHA}"
    waitFor: ["build-migration-image"]

  - id: run-migration
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -lc
      - |
        gcloud run jobs deploy slate-migrate \
          --image=${_AR_HOST}/${PROJECT_ID}/${_AR_REPO}/slate-migration:${SHORT_SHA} \
          --region=${_REGION} \
          --set-secrets=DATABASE_URL=DATABASE_URL:latest \
          --service-account=slate-runtime@${PROJECT_ID}.iam.gserviceaccount.com \
          --max-retries=0 \
          --quiet
        gcloud run jobs execute slate-migrate --region=${_REGION} --wait --quiet
    waitFor: ["push-migration-image", "push-image"]

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: bash
    args:
      - -lc
      - |
        # Ingress is owned by Terraform (internal-and-cloud-load-balancing).
        # Do NOT pass --allow-unauthenticated or --ingress here, or each
        # deploy would silently undo the TF-managed network policy.
        gcloud run deploy slate \
          --image=${_AR_HOST}/${PROJECT_ID}/${_AR_REPO}/slate:${SHORT_SHA} \
          --region=${_REGION} \
          --service-account=slate-runtime@${PROJECT_ID}.iam.gserviceaccount.com \
          --min-instances=0 \
          --max-instances=10 \
          --cpu=1 \
          --memory=1Gi \
          --port=8080 \
          --set-env-vars=NODE_ENV=production,LOG_LEVEL=info,OTEL_ENABLED=true,GCP_PROJECT_ID=${PROJECT_ID},GCP_REGION=${_REGION} \
          --set-secrets=DATABASE_URL=DATABASE_URL:latest,AUTH_SECRET=AUTH_SECRET:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,RESEND_API_KEY=RESEND_API_KEY:latest,GOOGLE_OAUTH_CLIENT_ID=GOOGLE_OAUTH_CLIENT_ID:latest,GOOGLE_OAUTH_CLIENT_SECRET=GOOGLE_OAUTH_CLIENT_SECRET:latest,GITHUB_OAUTH_CLIENT_ID=GITHUB_OAUTH_CLIENT_ID:latest,GITHUB_OAUTH_CLIENT_SECRET=GITHUB_OAUTH_CLIENT_SECRET:latest \
          --quiet
    waitFor: ["run-migration"]

substitutions:
  _AR_HOST: us-central1-docker.pkg.dev
  _AR_REPO: slate
  _REGION: us-central1

options:
  machineType: E2_HIGHCPU_8
  logging: CLOUD_LOGGING_ONLY

timeout: 1800s
